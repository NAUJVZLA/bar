<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradiente dorado de lujo -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <!-- Brillo dorado para simular luz neón de bar -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Círculo contenedor con fondo ultra oscuro traslúcido y borde dorado brillante -->
  <circle cx="256" cy="256" r="230" fill="#030303" stroke="url(#goldGrad)" stroke-width="18" />
  
  <!-- Anillo de puntos interno de diseño fino y tecnológico -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-dasharray="12 14" opacity="0.5" />

  <!-- Letra A premium y estilizada que emula un bar de alta gama -->
  <path d="M256 100 L385 410 H325 L256 230 L187 410 H127 Z" fill="url(#goldGrad)" filter="url(#glow)" />
  
  <!-- Barra transversal de la letra A con extremos redondeados -->
  <rect x="195" y="295" width="122" height="24" rx="12" fill="url(#goldGrad)" filter="url(#glow)" />
</svg>
