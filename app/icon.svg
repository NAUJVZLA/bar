<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradiente dorado premium de ALCO -->
    <linearGradient id="alcoGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde047" />
      <stop offset="60%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>

    <!-- Gradiente de fondo de vidrio oscuro translúcido con tono nocturno de bar -->
    <linearGradient id="glassBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11111a" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#020204" stop-opacity="0.98" />
    </linearGradient>
    
    <!-- Filtro de brillo neón dorado cibernético -->
    <filter id="cyberGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="11" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Filtro para el brillo posterior púrpura/índigo (Iluminación de bar lounge nocturno) -->
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.22" />
      <stop offset="70%" stop-color="#a855f7" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- 1. Brillo de ambiente nocturno (Morado/Índigo Lounge Glow) -->
  <circle cx="256" cy="256" r="250" fill="url(#purpleGlow)" />

  <!-- 2. Placa Hexagonal con diseño Cyber-Glassmorphism (Hexágono redondeado moderno) -->
  <path d="M256 30 L436 134 V378 L256 482 L76 378 V134 Z" fill="url(#glassBg)" stroke="url(#alcoGold)" stroke-width="12" stroke-linejoin="round" />
  
  <!-- 3. Segundo borde interior extra fino en oro de precisión -->
  <path d="M256 46 L416 138 V374 L256 466 L96 374 V138 Z" fill="none" stroke="url(#alcoGold)" stroke-width="3" stroke-dasharray="14 10" opacity="0.45" stroke-linejoin="round" />

  <!-- 4. Isotipo Monograma "A" Cibernético Estilizado (Geometría Segmentada de Lujo) -->
  <g filter="url(#cyberGlow)">
    <!-- Pierna Izquierda de la A segmentada -->
    <path d="M240 120 L150 400 H200 L256 220 Z" fill="url(#alcoGold)" />
    <!-- Pierna Derecha de la A segmentada -->
    <path d="M272 120 L256 170 L312 350 H362 Z" fill="url(#alcoGold)" opacity="0.85" />
    <!-- Barra transversal flotante de neón -->
    <path d="M190 300 H322" stroke="url(#alcoGold)" stroke-width="18" stroke-linecap="round" />
    <path d="M190 300 H322" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.8" filter="drop-shadow(0px 0px 3px #f59e0b)" />
  </g>

  <!-- 5. Puntos de luz en las intersecciones del hexágono -->
  <circle cx="256" cy="30" r="6" fill="#ffffff" filter="drop-shadow(0px 0px 4px #fbbf24)" />
  <circle cx="436" cy="134" r="5" fill="#ffffff" opacity="0.85" />
  <circle cx="436" cy="378" r="5" fill="#ffffff" opacity="0.85" />
  <circle cx="256" cy="482" r="6" fill="#ffffff" filter="drop-shadow(0px 0px 4px #fbbf24)" />
  <circle cx="76" cy="378" r="5" fill="#ffffff" opacity="0.85" />
  <circle cx="76" cy="134" r="5" fill="#ffffff" opacity="0.85" />
</svg>
